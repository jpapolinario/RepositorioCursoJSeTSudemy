<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
        }
        label {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form action="#" method="get" target="_blank" autocomplete="off">
    <p>O meu formulário</p>
    <p>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="NOME" placeholder="Seu nome">
    </p>
    <p>
        <label for="dev1">Sou um dev</label>
        <input type="checkbox" id="dev1" name="DEV1" value="sim">
        <label for="dev2"><br>Sou um dev</label>
        <input type="checkbox" id="dev2" name="DEV2" value="sim">
        <label for="dev3"><br>Sou um dev</label>
        <input type="checkbox" id="dev3" name="DEV3" value="sim">
    </p>
    <p>
        Gênero:<br>
        <label for="feminino">feminino</label>
        <input type="radio" id="feminino" name="genero" value="feminino">
        <label for="masculino"><br>masculino</label>
        <input type="radio" id="masculino" name="genero" value="masculino">
        <label for="outro_outra"><br>Outro ou outra</label>
        <input type="radio" id="outro_outra" name="genero" value="outro_outra">
    </p>
    <p>
        <button type="reset">Reset</button>
        <button type="submit">Enviar</button>
    </p>
    </form>
</body>
</html>
<!--
Parte 1
<form></form> é um bloco de conteudo
action="" para onde que eu vou mandar esse formulário
method="get" fala que os dados preenchidos serão anexados na URL
target="_blank" abrir a página em outra janela
autocomplete="off" não vai ficar falando coisas que você já digitou no formulário
<fieldset> cria uma borda para agrupar campos
<legend> define um título ou legenda para o fieldset

Parte 2

    <input type="text" id="nome" name="nome"> criou um espaço que aceita texto que o usuario pode escrever
</p>

cursor: pointer; deixa clicável

disabled input desabilitado
readonly tem como interagir mas não tem como escrever
checked deixa checado
required faz o campo ser obrigatório
<label for="nome">Nome:</label> fala para quem ele esta se direcionando usando uma id
type="checkbox" é uma caixa que pode ser marcada varias  vezes
type="radio" com os mesmos name é um circulo que só pode ter um marcado

existem tres tipos de botão
<button type="submit"> envia o dado
<button type="reset"> Reseta o valor
