<!--
pseudo classes refletem o estado do elemento
:hover quando eu passar o mouse sobre o elemento eu quero:
transition: all 300ms ease-in-out diz que em todas transições ele quer que demore 300 milisegundos e faça a função ease-in-out
a:link {
    color: deeppink;
} os links que eu nunca visitei tem essa cor
a:visited {
    color: firebrick;
} os links que ja visitei tem essa cor
a:hover {
    background: darkblue;
    color: white;
    text-decoration: none;
} quando eu passar o cursor, vai ter esse background, com essa cor, e nao vai ter nenhuma decoração de texto, que no caso seria o sublinhado
a:hover {
    background: darkblue;
    color: white;
    text-decoration: none;
} quando voce fica segurando o link fica desse jeito
input:focus {
    box-shadow: 0 0 50px deeppink;
    outline: none;
    border: 1px solid black;
} :foucs -> quando está clicado; box-shadow -> sombra da caixa 0 0 50px cor
input:disabled {
    background: rebeccapurple;
    cursor: not-allowed;
} :disable -> se refere a quando vai estar desabilitado, o que fazer; not-allowed -> cursos fica com o simbolo de bloqueado
input:enabled {
    background: rebeccapurple;
    cursor: not-allowed;
} :enable -> se refere a quando vai estar habilitado, significa quando o input está ativo
input:checked {
    width: 50px;
    height: 50px;
} quando ele estiver checado ele aumenta de tamanho
se voce fizer li*3 o vs code vai fazer 3 lis para voce 
.pai .lista li:first-child {
    background: red;
} :first-child vai pegar somente o primeiro filho
.pai .lista li:last-child {
    background: red;
} :last-child vai pegar somente o ultimo filho
input:required {
    background: red;
} quando for requerido o background é red
