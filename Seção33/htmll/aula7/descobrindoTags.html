<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descobrindo Tags</title>
</head>
<body>
    <ol>
        <li>Milk</li>
    </ol>
</body>
</html>
<!--<base> diz o endereço URL usado por todos os outros endereços do documento, só pode ter 1, exemplo: <base target="_blank" href="http://www.example.com/" />
<link> é uma tag usada para conectar documentos externos à sua página
<rel> é o atributo obrigatório da tag link que define qual é a relação entre sua pagina e esse documento, exemplo: <link href="style.css" rel="stylesheet" />
-->
