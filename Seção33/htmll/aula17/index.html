<!--
Quando for usar CSS sempre opta por classes
É possível colocar o style no body
<link rel="stylesheet" href="style.css"> para linkar tanto arquivos quanto sites em css
rel significa relacionamento, falando qual a relação do link com a página atual
CSS (Cascading Style Sheets ou Folhas de Estilo em Cascata)
href="assets/css/styles.css" a cada pasta voce vai colocando /, para voce disser que é direto da pasta que o arquivo esta é só colocar ./ no inicio
. = "Fique aqui" (Olhe dentro da pasta atual)
.. = "Suba um nível" (Volte para a pasta que guarda a pasta atual)
/ = "Entre na pasta".
Cada ../ é como clicar na setinha de voltar do seu navegador de arquivos.

-->
