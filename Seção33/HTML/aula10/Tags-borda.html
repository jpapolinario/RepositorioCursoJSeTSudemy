<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .section-one {
            background: deeppink;
            background-image: url(https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Altja_j%C3%B5gi_Lahemaal.jpg/960px-Altja_j%C3%B5gi_Lahemaal.jpg);
            background-size: cover;
            background-position: center center;
            color: #fff;
            width: 300px;
            height: 150px;
            padding: 10px; 
            margin: 20px;
            border: 10px;
            border-style: solid;
            border-bottom-width: 20px;
            border-bottom-color: #b22222;
            border-top-color: #ffff00;
            border-right-color: #008000;
            border-left-color: #0000ff;
        }
        .section-two {
            background: cyan;
            width: 200px;
            height: 50px;
            border: 5px solid black;
            padding: 15px; 
            margin: 30px;
        }
    </style>
</head>
<body>
    <section class="section-one">Lorem ipsum dolor sit amet consectetur</section>
    <section class="section-two">2</section>
</body>
</html>
<!--
A margem é transparente, só serve pra empurrar
para as alterações da border aparecer, voce precisa mexer na largura, o estilo dela e na cor
box-sizing: border-box; deixa do tamanho que voce declarou a altura e largura
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
        }
border-bottom-width: 20px; Você precisa usar a palavra width pq ela diz que você quer alterar apenas o tamanho daquela borda, sem mexer na cor ou no estilo. se você não fazer isso, e nao colocar o width, voce precisa declarar o estilo e a cor de novo para a bordar aparecer
background-image: url(LINK); voce coloca a imagem do link como fundo
