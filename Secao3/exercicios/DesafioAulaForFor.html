<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcule seu IMC</title>
    <link rel="stylesheet" href="TudoPassadoAntesDaAulaQuarentaEQuatro.css">
</head>

<body>
    <section class="secao">
        <h1>Tabela IMC</h1>
        <div class="linha-tabela">
            <h3>IMC</h3>
            <h3>Resultado</h3>
        </div>
        <div class="linha-tabela">
            <p>Menos do que 18,5</p> <p>Abaixo do peso</p>
        </div>
        <div class="linha-tabela">
            <p>Entre 18,5 e 24,9</p> <p>Peso normal</p>
        </div>
        <div class="linha-tabela">
            <p>Entre 25 e 29,9</p> <p>Sobrepeso</p>
        </div>
        <div class="linha-tabela">
            <p>Entre 30 e 34,9</p> <p>Obesidade grau 1</p>
        </div>
        <div class="linha-tabela">
            <p>Entre 35 e 39,9</p> <p>Obesidade grau 2</p>
        </div>
        <div class="linha-tabela">
            <p>Mais do que 40</p> <p>Obesidade grau 3</p>
        </div>
        <h1>Calcule seu IMC</h1>
        <form class="FORM" action="/" method="POST">
            <label for="peso">Peso:</label>
            <input type="text" id="peso">
            <label for="altura">Altura:</label>
            <input type="text" id="altura">
            <button>Calcular<br></button>
        </form>
        <div id="resultado"></div>
    </section>

    <script src="TudoPassadoAntesDaAulaQuarentaEQuatro.js"></script>
</body>

</html>
